<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nova — offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font: 16px/1.5 -apple-system, Segoe UI, system-ui, sans-serif;
        background: #0b0d12;
        color: #e5e7eb;
      }
      .card {
        max-width: 420px;
        padding: 32px;
        text-align: center;
      }
      h1 { margin: 0 0 8px; font-size: 22px; }
      p { margin: 0 0 16px; color: #9ca3af; }
      button {
        padding: 10px 20px;
        background: #6366f1;
        color: #fff;
        border: 0;
        border-radius: 8px;
        font: inherit;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Offline</h1>
      <p>We can't reach Nova right now. Check your connection and try again.</p>
      <button onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
